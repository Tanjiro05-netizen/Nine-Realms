<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>九州圣兵 · Nine Realms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;800&family=ZCOOL+XiaoWei&family=Cinzel:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #e8c068;
        --line: rgba(232, 192, 104, 0.35);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #000; color: #f2e9d8; font-family: 'Noto Serif SC', serif; }
      #scene { position: fixed; inset: 0; display: block; }
      #loader {
        position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
        background: radial-gradient(circle at 50% 40%, #2a1f3a, #0c0a12);
        transition: opacity 0.6s; text-align: center;
      }
      #loader.hidden { opacity: 0; pointer-events: none; }
      #loader .lt { font-family: 'ZCOOL XiaoWei'; font-size: 46px; letter-spacing: 8px; color: var(--gold); }
      #loader .lsub { font-family: 'Cinzel'; font-size: 13px; letter-spacing: 4px; color: #b7a9cf; margin-top: 6px; }
      .badge {
        position: fixed; left: 12px; bottom: 12px; z-index: 10; font-size: 11px; letter-spacing: 2px;
        color: #9a8fb0; background: rgba(12, 9, 18, 0.6); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="loader">
      <div>
        <div class="lt">九州圣兵</div>
        <div class="lsub" id="loadtxt">NINE REALMS</div>
      </div>
    </div>
    <div class="badge">M0 · Vite + TS + Three.js — drag to orbit</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
