<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>九州圣兵 · Nine Realms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;800&family=ZCOOL+XiaoWei&family=Cinzel:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #e8c068; --gold-bright: #ffdf94; --gold-dim: #8c7234;
        --panel: rgba(20, 16, 28, 0.82); --panel2: rgba(30, 24, 42, 0.9);
        --line: rgba(232, 192, 104, 0.35); --enemy: #ff5a4d;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; overflow: hidden; background: #000; color: #f2e9d8; font-family: 'Noto Serif SC', serif; user-select: none; }
      #scene { position: fixed; inset: 0; display: block; }
      #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      #hud .top, #hud .rail, #hud .dock { pointer-events: none; }
      #hud button, #hud .card, #hud .bslot { pointer-events: auto; }

      /* loader */
      #loader {
        position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
        background: radial-gradient(circle at 50% 40%, #2a1f3a, #0c0a12);
        transition: opacity 0.6s; text-align: center;
      }
      #loader.hidden { opacity: 0; pointer-events: none; }
      #loader .lt { font-family: 'ZCOOL XiaoWei'; font-size: 46px; letter-spacing: 8px; color: var(--gold); }
      #loader .lsub { font-family: 'Cinzel'; font-size: 13px; letter-spacing: 4px; color: #b7a9cf; margin-top: 6px; }

      /* top bar */
      .top { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: flex-start; justify-content: space-between; }
      .pcard { display: flex; align-items: center; gap: 10px; padding: 10px 16px; }
      .pcard .por { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--gold); display: grid; place-items: center; font-family: 'ZCOOL XiaoWei'; font-size: 20px; background: radial-gradient(circle at 40% 30%, #3a2c4f, #160f22); box-shadow: 0 0 14px rgba(232,192,104,.3); }
      .pmeta { min-width: 160px; }
      .pname { font-size: 14px; letter-spacing: 1px; font-family: 'ZCOOL XiaoWei'; }
      .hpbar { height: 14px; width: 180px; background: #140d14; border: 1px solid rgba(0,0,0,.6); border-radius: 8px; overflow: hidden; position: relative; margin-top: 3px; }
      .hpbar i { display: block; height: 100%; background: linear-gradient(90deg,#46e6cf,#2bbf9c); transition: width .4s; }
      .hpbar span { position: absolute; inset: 0; font-size: 10px; display: grid; place-items: center; font-family: 'Cinzel'; text-shadow: 0 1px 2px #000; }
      .lvlpill { font-family: 'Cinzel'; font-weight: 800; background: linear-gradient(#3a2c4f,#1c1430); border: 1px solid var(--gold); border-radius: 6px; padding: 4px 9px; font-size: 13px; color: var(--gold-bright); align-self: center; }
      .stagebox { margin-top: 6px; text-align: center; background: linear-gradient(180deg,rgba(30,22,44,.9),rgba(12,9,18,.6)); border: 1px solid var(--line); border-radius: 0 0 14px 14px; padding: 6px 30px 9px; }
      .stagebox .st { font-family: 'ZCOOL XiaoWei'; font-size: 15px; color: var(--gold); letter-spacing: 2px; }
      .stagebox .pl { font-size: 11px; color: #c9bce0; letter-spacing: 3px; margin-top: 2px; }

      /* trait rail */
      .rail { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 7px; width: 158px; }
      .railhd { font-family: 'ZCOOL XiaoWei'; font-size: 12px; color: var(--gold-dim); letter-spacing: 3px; padding-left: 4px; }
      .trait { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid rgba(255,255,255,.06); border-left: 3px solid var(--tc); border-radius: 8px; padding: 6px 9px; opacity: .5; transition: .2s; }
      .trait.on { opacity: 1; box-shadow: 0 0 14px -3px var(--tc); background: var(--panel2); }
      .trait .tIcon { color: var(--tc); font-size: 15px; font-family: 'Noto Serif SC'; width: 18px; text-align: center; }
      .trait .tName { flex: 1; font-family: 'ZCOOL XiaoWei'; font-size: 14px; line-height: 1; }
      .trait .tName small { display: block; font-family: 'Cinzel'; font-size: 8px; color: #9a8fb0; letter-spacing: 1px; text-transform: uppercase; }
      .trait .tNum { font-family: 'Cinzel'; font-weight: 800; font-size: 14px; color: var(--tc); }

      /* bottom dock */
      .dock { position: absolute; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; padding-bottom: 10px; }
      .bench { display: flex; gap: 5px; background: linear-gradient(180deg,rgba(18,13,26,.4),rgba(18,13,26,.85)); border: 1px solid var(--line); border-radius: 12px; padding: 6px; }
      .bslot { width: 64px; height: 50px; border-radius: 8px; background: rgba(255,255,255,.03); border: 1px dashed rgba(255,255,255,.12); display: grid; place-items: center; position: relative; cursor: default; transition: .15s; }
      .bslot.filled { cursor: pointer; border: 1px solid var(--rc); background: linear-gradient(180deg,rgba(40,30,55,.9),rgba(20,14,30,.95)); box-shadow: inset 0 0 12px -4px var(--rc); }
      .bslot.filled:hover { transform: translateY(-3px); }
      .bslot.sel { box-shadow: 0 0 0 2px var(--gold-bright), 0 0 16px var(--gold); }
      .bslot .bName { font-family: 'ZCOOL XiaoWei'; font-size: 13px; line-height: 1.1; text-align: center; }
      .bslot .bStar { position: absolute; top: 2px; right: 4px; font-size: 8px; color: var(--gold-bright); }

      .econ { display: flex; align-items: center; gap: 14px; background: linear-gradient(180deg,rgba(30,22,44,.9),rgba(12,9,18,.75)); border: 1px solid var(--line); border-radius: 10px; padding: 7px 16px; }
      .econ .g { font-family: 'Cinzel'; font-weight: 800; font-size: 18px; color: var(--gold-bright); display: flex; align-items: center; gap: 5px; }
      .econ .g::before { content: '\25C6'; color: var(--gold); }
      .econ .uc { font-family: 'Cinzel'; font-size: 14px; color: #cfc4dd; }
      .econ .uc b { color: #fff; }
      .xpwrap { width: 130px; }
      .xptxt { font-size: 10px; color: #b7a9cf; font-family: 'Cinzel'; display: flex; justify-content: space-between; }
      .xpbar { height: 7px; background: #140d14; border-radius: 4px; overflow: hidden; margin-top: 2px; border: 1px solid rgba(0,0,0,.5); }
      .xpbar i { display: block; height: 100%; background: linear-gradient(90deg,#c78bff,#7f4fd6); transition: width .3s; }

      .shoprow { display: flex; align-items: stretch; gap: 8px; }
      .sidebtns { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
      .shop { display: flex; gap: 8px; }
      .card { width: 112px; height: 120px; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; background: linear-gradient(180deg,#241a33,#120c1d); border: 1px solid var(--cc,#444); transition: .15s; box-shadow: 0 6px 16px rgba(0,0,0,.5); }
      .card:hover { transform: translateY(-5px); box-shadow: 0 10px 22px rgba(0,0,0,.6), 0 0 16px -4px var(--cc); }
      .card.empty { opacity: .25; cursor: default; border-style: dashed; }
      .card.empty:hover { transform: none; }
      .card .cTop { padding: 7px 8px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,.08); }
      .card .cName { font-family: 'ZCOOL XiaoWei'; font-size: 18px; letter-spacing: 1px; }
      .card .cBody { padding: 9px; display: flex; flex-direction: column; gap: 5px; height: 56px; }
      .card .cTr { font-size: 11px; color: #cfc4dd; text-transform: capitalize; }
      .card .cTr i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 5px; vertical-align: middle; }
      .card .cCost { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-family: 'Cinzel'; font-weight: 800; font-size: 14px; padding: 5px; background: rgba(0,0,0,.45); }

      .btn { font-family: 'ZCOOL XiaoWei'; font-size: 14px; color: #f4ead6; background: linear-gradient(180deg,#3a2c4f,#1c1430); border: 1px solid var(--gold-dim); border-radius: 9px; padding: 8px 14px; cursor: pointer; transition: .15s; white-space: nowrap; letter-spacing: 1px; }
      .btn:hover { border-color: var(--gold); box-shadow: 0 0 12px -3px var(--gold); color: #fff; }
      .btn small { display: block; font-family: 'Cinzel'; font-size: 9px; color: #a89bc0; }
      .btn.gold { border-color: var(--gold); background: linear-gradient(180deg,#5a4420,#2c2008); color: var(--gold-bright); }
      .btn.start { background: linear-gradient(180deg,#b5392a,#7a2016); border-color: #ff7a4a; color: #ffe; font-size: 16px; padding: 10px 22px; box-shadow: 0 0 18px -4px #ff5a3a; }
      .btn.start:hover { box-shadow: 0 0 26px -2px #ff7a4a; }

      /* combat bars + damage numbers */
      #bars, #fx { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 8; }
      .ubar { position: absolute; width: 52px; }
      .ubar .hp, .ubar .sh, .ubar .mp { border-radius: 3px; overflow: hidden; }
      .ubar .hp { height: 6px; background: #1a0f12; border: 1px solid rgba(0,0,0,.6); }
      .ubar .hp i { display: block; height: 100%; background: linear-gradient(#5be08a,#27b562); transition: width .1s; }
      .ubar.enemy .hp i { background: linear-gradient(#ff7a6e,#d63a30); }
      .ubar .sh { height: 3px; margin-top: 1px; background: #20242e; }
      .ubar .sh i { display: block; height: 100%; background: #e8e8f0; }
      .ubar .mp { height: 3px; margin-top: 1px; background: #0e1424; }
      .ubar .mp i { display: block; height: 100%; background: linear-gradient(#7fd4ff,#3f8fe0); }
      .dmg { position: absolute; font-family: 'Cinzel', serif; font-weight: 800; font-size: 17px; transform: translate(-50%,-50%); text-shadow: 0 2px 4px rgba(0,0,0,.9); transition: transform .65s ease-out, opacity .65s ease-out; }
      .dmg.crit { font-size: 27px; text-shadow: 0 0 10px #ffae3a, 0 2px 5px #000; }

      #toast { position: fixed; left: 50%; bottom: 200px; transform: translateX(-50%); z-index: 30; background: rgba(12,9,18,.92); border: 1px solid var(--line); border-radius: 20px; padding: 8px 20px; font-size: 13px; color: #f0e6d4; letter-spacing: 1px; opacity: 0; transition: .3s; pointer-events: none; }
      #toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="loader">
      <div>
        <div class="lt">九州圣兵</div>
        <div class="lsub" id="loadtxt">NINE REALMS</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
